<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <!-- Formulário à esquerda -->
        <div class="col-md-6">
            <h3 th:if="${novoProduto.id == null}">Cadastrar Produto</h3>
            <h3 th:unless="${novoProduto.id == null}">Editar Produto</h3>
            <form th:action="@{/admin/produtos/salvar}" th:object="${novoProduto}" method="post" class="border p-4 rounded">
                <input type="hidden" th:field="*{id}" />
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="nome" th:field="*{nome}" required />
                </div>
                <div class="mb-3">
                    <label for="categoria" class="form-label">Categoria</label>
                    <input type="text" class="form-control" id="categoria" th:field="*{categoria}" required />
                </div>
                <div class="mb-3">
                    <label for="preco" class="form-label">Preço</label>
                    <input type="number" step="0.01" class="form-control" id="preco" th:field="*{preco}" required />
                </div>
                <div class="mb-3">
                    <label for="descricao" class="form-label">Descrição</label>
                    <textarea class="form-control" id="descricao" rows="3" th:field="*{descricao}"></textarea>
                </div>
                <div class="mb-3">
                    <label for="quantidadeEstoque" class="form-label">Quantidade em Estoque</label>
                    <input type="number" class="form-control" id="quantidadeEstoque" th:field="*{quantidadeEstoque}" required />
                </div>
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="/admin/produtos" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
        <!-- Tabela à direita -->
        <div class="col-md-6">
            <h3>Produtos Cadastrados</h3>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.id}"></td>
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.categoria}"></td>
                        <td th:text="${produto.preco}"></td>
                        <td th:text="${produto.quantidadeEstoque}"></td>
                        <td>
                            <a th:href="@{/admin/produtos/editar/{id}(id=${produto.id})}" class="btn btn-sm btn-warning">Editar</a>
                            <a th:href="@{/admin/produtos/excluir/{id}(id=${produto.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Excluir</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
