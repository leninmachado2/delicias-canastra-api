<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empório Delícias da Canastra - Catálogo</title>
    <meta name="description" content="Produtos artesanais e delícias da Canastra. Faça seu pedido via WhatsApp.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">Empório Delícias da Canastra</a>
        </div>
    </nav>

    <main class="container mt-4">
        <!-- Welcome message placeholder -->
        <div id="welcomeMessage" class="alert alert-warning" style="display: none;" role="status"></div>

        <div class="row">
            <!-- Main content: product cards -->
            <div class="col-md-8">
                <h1 class="mb-4">Catálogo de Produtos</h1>

                <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info">Nenhum produto disponível no momento.</div>

                <div class="row" th:each="produto : ${produtos}">
                    <div class="col-sm-6 col-lg-4 mb-4">
                        <div class="card h-100 shadow-sm">
                            <div class="product-image-wrapper">
                                <img th:if="${produto.caminhoImagem != null and !#strings.isEmpty(produto.caminhoImagem)}" th:src="@{'/img/' + ${produto.caminhoImagem}}" th:alt="${produto.nome}"
                                     class="card-img-top product-image" loading="lazy">
                                <div th:if="${produto.caminhoImagem == null or #strings.isEmpty(produto.caminhoImagem)}" class="product-placeholder">
                                    <span>Sem imagem disponível</span>
                                </div>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title" th:text="${produto.nome}">Nome do Produto</h5>
                                <p class="card-text text-muted" th:text="${produto.descricao}" style="font-size: 0.9rem;">Descrição</p>
                                <p class="card-text fw-bold mt-auto" th:text="'R$ ' + ${#numbers.formatDecimal(produto.preco, 1, 2)}">Preço</p>
                                <button class="btn btn-primary mt-2 w-100" th:attr="data-id=${produto.id},data-nome=${produto.nome},data-preco=${produto.preco}" aria-label="Adicionar ao carrinho" onclick="adicionarAoCarrinho(this)">Adicionar ao Carrinho</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar: shopping cart -->
            <aside class="col-md-4">
                <div class="card sticky-top mobile-sticky" style="top:1rem;">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Carrinho</h5>
                        <button class="btn btn-sm btn-outline-danger" type="button" onclick="limparCarrinho()" aria-label="Limpar carrinho">Limpar</button>
                    </div>
                    <div class="card-body" id="cartContent">
                        <div id="cartItems" aria-live="polite"></div>
                        <div class="cart-total">Total: <span id="cartTotal">R$ 0,00</span></div>
                        <hr>
                        <form id="orderForm">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>
                            <div class="mb-3">
                                <label for="telefone" class="form-label">Telefone</label>
                                <input type="tel" inputmode="tel" pattern="[0-9()+\-\s]{8,}" class="form-control" id="telefone" placeholder="(xx) xxxxx-xxxx" required>
                            </div>
                            <div class="mb-3">
                                <label for="pontoRetirada" class="form-label">Ponto de Retirada</label>
                                <select class="form-select" id="pontoRetirada">
                                    <option value="BB Sede I">BB Sede I</option>
                                    <option value="BB Sede III">BB Sede III</option>
                                </select>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="lembrarDados">
                                <label class="form-check-label" for="lembrarDados">Lembrar meus dados</label>
                            </div>
                            <button type="button" class="btn btn-success w-100" onclick="finalizarPedido()">Finalizar Pedido</button>
                        </form>
                        <div id="orderFeedback" class="alert alert-info visually-hidden mt-3" role="status"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Carrinho em memória
        let carrinho = [];

        // Lembrar dados controlado pelo checkbox
        function carregarDadosLembrados() {
            const nome = localStorage.getItem('nome');
            const telefone = localStorage.getItem('telefone');
            const pontoRetirada = localStorage.getItem('pontoRetirada');
            if (nome || telefone || pontoRetirada) {
                if (nome) document.getElementById('nome').value = nome;
                if (telefone) document.getElementById('telefone').value = telefone;
                if (pontoRetirada) document.getElementById('pontoRetirada').value = pontoRetirada;
                document.getElementById('lembrarDados').checked = true;
                const welcomeDiv = document.getElementById('welcomeMessage');
                welcomeDiv.innerText = `Bem-vindo(a) de volta, ${nome || ''}`;
                welcomeDiv.style.display = 'block';
            }
        }

        function salvarDadosLembrados() {
            const lembrar = document.getElementById('lembrarDados').checked;
            if (!lembrar) {
                localStorage.removeItem('nome');
                localStorage.removeItem('telefone');
                localStorage.removeItem('pontoRetirada');
                return;
            }
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const pontoRetirada = document.getElementById('pontoRetirada').value;
            localStorage.setItem('nome', nome);
            localStorage.setItem('telefone', telefone);
            localStorage.setItem('pontoRetirada', pontoRetirada);
        }

        // Adicionar ao carrinho
        function adicionarAoCarrinho(btn) {
            const id = btn.getAttribute('data-id');
            const nome = btn.getAttribute('data-nome');
            const preco = parseFloat(btn.getAttribute('data-preco'));
            const existing = carrinho.find(item => item.id === id);
            if (existing) {
                existing.quantidade++;
            } else {
                carrinho.push({ id, nome, preco, quantidade: 1 });
            }
            renderizarCarrinho();
        }

        // Renderizar carrinho
        function renderizarCarrinho() {
            const cartItemsDiv = document.getElementById('cartItems');
            cartItemsDiv.innerHTML = '';
            if (carrinho.length === 0) {
                cartItemsDiv.innerHTML = '<div class="text-muted">Seu carrinho está vazio.</div>';
                document.getElementById('cartTotal').innerText = 'R$ 0,00';
                return;
            }
            let total = 0;
            carrinho.forEach((item, index) => {
                total += item.preco * item.quantidade;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item mb-2';
                itemDiv.innerHTML = `
                    <div><strong>${item.nome}</strong></div>
                    <div class="d-flex align-items-center mt-1">
                        <button class="btn btn-sm btn-secondary" onclick="alterarQuantidade(${index}, -1)" aria-label="Diminuir quantidade">-</button>
                        <span class="mx-2">${item.quantidade}</span>
                        <button class="btn btn-sm btn-secondary" onclick="alterarQuantidade(${index}, 1)" aria-label="Aumentar quantidade">+</button>
                        <button class="btn btn-sm btn-danger ms-2" onclick="removerItem(${index})" aria-label="Remover item">Remover</button>
                        <div class="ms-auto">R$ ${(item.preco * item.quantidade).toFixed(2)}</div>
                    </div>
                `;
                cartItemsDiv.appendChild(itemDiv);
            });
            document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2)}`;
        }

        function alterarQuantidade(index, delta) {
            const item = carrinho[index];
            if (item) {
                item.quantidade += delta;
                if (item.quantidade <= 0) {
                    carrinho.splice(index, 1);
                }
                renderizarCarrinho();
            }
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            renderizarCarrinho();
        }

        function limparCarrinho() {
            if (!confirm('Deseja limpar o carrinho?')) return;
            carrinho = [];
            renderizarCarrinho();
        }

        // Finalizar pedido via WhatsApp
        async function finalizarPedido() {
            const nome = document.getElementById('nome').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const ponto = document.getElementById('pontoRetirada').value;
            const feedback = document.getElementById('orderFeedback');
            feedback.classList.add('visually-hidden');

            if (!nome || !telefone || carrinho.length === 0) {
                alert('Preencha todos os campos e adicione itens ao carrinho.');
                return;
            }
            salvarDadosLembrados();

            const payload = {
                nome,
                telefone,
                pontoRetirada: ponto,
                itens: carrinho.map(item => ({ produtoId: item.id, quantidade: item.quantidade }))
            };

            try {
                const response = await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Erro ao criar pedido');
                }

                const result = await response.json();
                feedback.textContent = `Pedido ${result.pedidoId} criado. Total: R$ ${result.valorTotal.toFixed(2)}.`;
                feedback.classList.remove('visually-hidden');
                feedback.classList.remove('alert-danger');
                feedback.classList.add('alert-info');

                if (result.paymentUrl) {
                    window.open(result.paymentUrl, '_blank');
                }
            } catch (error) {
                feedback.textContent = 'Erro ao criar pedido: ' + (error.message || 'Tente novamente.');
                feedback.classList.remove('visually-hidden');
                feedback.classList.remove('alert-info');
                feedback.classList.add('alert-danger');
            }
        }

        // Carregar dados ao iniciar
        window.onload = function() { carregarDadosLembrados(); renderizarCarrinho(); };
    </script>
</body>
</html>
